<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/anon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>INFO2222-Group</title>
  <link rel="stylesheet" href="/live2d/live2d-icons.css">
  <style>
    #waifu {
      right: 0 !important;
      left: auto !important;
    }
  </style>
</head>·

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <!-- Live2D -->
  <div id="waifu">
    <div id="waifu-message" style="display: none;"></div>
    <div class="waifu-tool">
      <span class="icon-next"></span>
      <span class="icon-home"></span>
      <span class="icon-message"></span>
      <span class="icon-camera"></span>
      <span class="icon-volumeup"></span>
      <span class="icon-volumedown"></span>
      <span class="icon-about"></span>
      <span class="icon-cross"></span>
    </div>
    <canvas id="live2d2"></canvas>
    <canvas id="live2d4"></canvas>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.waifuPath = '/live2d';
      setTimeout(() => {
        const script1 = document.createElement('script');
        script1.src = '/live2d/dist/live2d_bundle.js';
        document.body.appendChild(script1);
        script1.onload = () => {
          const script2 = document.createElement('script');
          script2.src = '/live2d/waifu-tips.js';
          document.body.appendChild(script2);
        };
      }, 1000);
    });
  </script>
</body>

</html>
